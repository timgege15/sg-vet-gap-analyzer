<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>SG Vet Gap Analyzer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.control-panel {
  position:absolute;
  top:10px;
  left:10px;
  width:260px;
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.25);
  z-index:1000;
}

.control-panel input,
.control-panel select {
  width:100%;
  margin:6px 0 12px 0;
  padding:6px;
}

#sidePanel {
  position:absolute;
  top:10px;
  right:10px;
  width:300px;
  height:calc(100% - 20px);
  background:white;
  box-shadow:-3px 0 10px rgba(0,0,0,0.3);
  padding:20px;
  overflow:auto;
  transform:translateX(110%);
  transition:0.3s ease;
  z-index:1200;
}

#sidePanel.open { transform:translateX(0); }

#closePanel {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
  <b>Evaluate Site (Postal Code)</b>
  <input type="text" id="postalInput" placeholder="Enter 6-digit postal">
  <button onclick="searchPostal()">Evaluate</button>
</div>

<div id="sidePanel">
  <div id="closePanel" onclick="closePanel()">✕</div>
  <h3>Site Evaluation</h3>
  <div id="evaluationResult"></div>
</div>

<script src="locations.js"></script>

<script>

const map=L.map('map').setView([1.3521,103.8198],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

let planningAreas=null;
let incomeLookup=null;
let populationDensityLookup=null;

fetch('planning-areas.geojson')
.then(r=>r.json())
.then(data=>planningAreas=data);

fetch('income-by-planning-area.json')
.then(r=>r.json())
.then(data=>incomeLookup=data);

fetch('population-density-by-planning-area.json')
.then(r=>r.json())
.then(data=>populationDensityLookup=data);

function searchPostal(){

  const postal=document.getElementById('postalInput').value;

  fetch(`https://www.onemap.gov.sg/api/common/elastic/search?searchVal=${postal}&returnGeom=Y&getAddrDetails=Y`)
  .then(r=>r.json())
  .then(data=>{
    if(!data.results.length) return;

    const lat=parseFloat(data.results[0].LATITUDE);
    const lng=parseFloat(data.results[0].LONGITUDE);

    map.setView([lat,lng],15);
    L.marker([lat,lng]).addTo(map);

    let html="";

    if(planningAreas && incomeLookup && populationDensityLookup){

      const pt=turf.point([lng,lat]);

      for(let feature of planningAreas.features){
        if(turf.booleanPointInPolygon(pt,feature)){

          const areaName=feature.properties.PLN_AREA_N.toUpperCase();
          const densityData=populationDensityLookup[areaName];
          const income=incomeLookup[areaName];

          html+=`<h4>Planning Area</h4>${areaName}`;

          if(densityData){
            html+=`<br><b>Population Density:</b> ${densityData.density_per_km2.toLocaleString()} / km²`;
            html+=`<br><b>Resident Population:</b> ${densityData.population.toLocaleString()}`;
          }

          if(income){
            html+=`<br><b>Median Monthly HH Income:</b> $${Math.round(income).toLocaleString()}`;
          }

          break;
        }
      }
    }

    document.getElementById('evaluationResult').innerHTML=html;
    document.getElementById('sidePanel').classList.add('open');
  });
}

function closePanel(){
  document.getElementById('sidePanel').classList.remove('open');
}

</script>
</body>
</html>
