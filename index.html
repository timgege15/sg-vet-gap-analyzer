<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Strategic Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin: 0; }
#map { height: 100vh; }

.radius-control {
  position: absolute;
  top: 85px;
  left: 10px;
  z-index: 2000;
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-size: 13px;
}

.search-control {
  position: absolute;
  top: 155px;
  left: 10px;
  z-index: 2000;
  background: white;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-size: 13px;
}

.side-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 340px;
  height: 100%;
  background: white;
  z-index: 1500;
  padding: 15px;
  box-shadow: -2px 0 6px rgba(0,0,0,0.2);
  overflow-y: auto;
  transition: transform 0.3s ease;
}

.side-panel.hidden {
  transform: translateX(100%);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
}

.loading {
  color: #888;
  font-style: italic;
}

.score {
  padding: 8px;
  border-radius: 6px;
  font-weight: bold;
  margin-bottom: 10px;
}
.good { background:#d4edda; color:#155724; }
.medium { background:#fff3cd; color:#856404; }
.bad { background:#f8d7da; color:#721c24; }
</style>
</head>
<body>

<div id="map"></div>

<div class="radius-control">
  Competition Radius:
  <select id="radiusSelect">
    <option value="1000">1km</option>
    <option value="2000">2km</option>
    <option value="3000">3km</option>
  </select>
</div>

<div class="search-control">
  <div><b>Evaluate Site</b></div>
  <form onsubmit="handleSearch(event)">
    <input type="text" id="postalInput" placeholder="Postal Code" />
    <button type="submit">Search</button>
  </form>
</div>

<div class="side-panel hidden" id="resultsPanel">
  <div class="panel-header">
    <h3>Site Evaluation</h3>
    <div class="close-btn" onclick="togglePanel()">×</div>
  </div>
  <div id="resultsContent">
    Enter postal code to evaluate location.
  </div>
</div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521, 103.8198], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

const clinicLayer = L.markerClusterGroup();
const opportunityLayer = L.layerGroup();
const industrialLayer = L.layerGroup();
const restrictedLayer = L.layerGroup();
const lineLayer = L.layerGroup().addTo(map);

let siteMarker = null;
let currentGridLayer = null;

document.getElementById("postalInput").focus();

/* ===== RESTORE CLINIC POPUPS ===== */
locations.forEach(loc => {

  const marker = L.marker([loc.lat, loc.lng]);

  let popup = `<b>${loc.address}</b><br><br>`;

  loc.clinics.forEach(c=>{
    popup += `<b>${c.name}</b><br>📞 ${c.phone}<br><br>`;
  });

  marker.bindPopup(popup);
  clinicLayer.addLayer(marker);
});

map.addLayer(clinicLayer);

/* ===== GRID LOADING ===== */
function loadGrid(radiusKm){
  if(currentGridLayer) map.removeLayer(currentGridLayer);

  opportunityLayer.clearLayers();
  industrialLayer.clearLayers();
  restrictedLayer.clearLayers();

  fetch(`grid-${radiusKm/1000}km.json`)
  .then(res=>res.json())
  .then(grid=>{
    const cellSize=0.0035;
    grid.forEach(cell=>{
      let layer,color;
      if(cell.type==="opportunity"){layer=opportunityLayer;color="green";}
      else if(cell.type==="industrial"){layer=industrialLayer;color="orange";}
      else if(cell.type==="restricted"){layer=restrictedLayer;color="#444";}
      else return;

      L.rectangle([[cell.lat,cell.lng],[cell.lat+cellSize,cell.lng+cellSize]],
      {color,weight:0.2,fillColor:color,fillOpacity:0.35}).addTo(layer);
    });

    currentGridLayer=L.layerGroup([opportunityLayer,industrialLayer,restrictedLayer]);
    map.addLayer(currentGridLayer);
  });
}

loadGrid(1000);

document.getElementById("radiusSelect").addEventListener("change",function(){
  loadGrid(parseInt(this.value));
});

/* ===== DISTANCE ===== */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ===== PANEL ===== */
function togglePanel(){
  document.getElementById("resultsPanel").classList.toggle("hidden");
}

/* ===== SEARCH ===== */
function handleSearch(e){
  e.preventDefault();
  searchPostal();
}

function searchPostal(){

  const postal=document.getElementById("postalInput").value.trim();
  if(!/^\d{6}$/.test(postal)){
    alert("Enter valid 6-digit postal code.");
    return;
  }

  document.getElementById("resultsContent").innerHTML="<div class='loading'>Searching...</div>";
  document.getElementById("resultsPanel").classList.remove("hidden");

  fetch(`https://www.onemap.gov.sg/api/common/elastic/search?searchVal=${postal}&returnGeom=Y&getAddrDetails=Y`)
  .then(res=>res.json())
  .then(data=>{
    if(!data.results.length){alert("Postal not found.");return;}

    const lat=parseFloat(data.results[0].LATITUDE);
    const lng=parseFloat(data.results[0].LONGITUDE);

    if(siteMarker) map.removeLayer(siteMarker);
    lineLayer.clearLayers();

    siteMarker=L.marker([lat,lng]).addTo(map);
    map.setView([lat,lng],15);

    evaluateSite(lat,lng);
  });
}

function evaluateSite(lat,lng){

  const radius=parseInt(document.getElementById("radiusSelect").value);

  let distances=[];
  locations.forEach(loc=>{
    const d=haversine(lat,lng,loc.lat,loc.lng);
    distances.push({distance:d,location:loc});
  });

  distances.sort((a,b)=>a.distance-b.distance);

  const top3=distances.slice(0,3);
  const withinRadius=distances.filter(d=>d.distance<=radius).length;

  let scoreClass="good";
  let scoreText="Low Competition";

  if(withinRadius>=5){scoreClass="bad";scoreText="High Competition";}
  else if(withinRadius>=3){scoreClass="medium";scoreText="Moderate Competition";}

  let html=`<div class="score ${scoreClass}">
  Competition within ${radius/1000}km: ${withinRadius}<br>
  ${scoreText}
  </div>`;

  html+="<h3>Nearest Clinics</h3>";

  top3.forEach((item,i)=>{
    const d=item.distance;
    const distText=d<1000?`${Math.round(d)} m`:`${(d/1000).toFixed(2)} km`;

    html+=`<p><b>${i+1}. ${item.location.clinics.map(c=>c.name).join(", ")}</b><br>
    Distance: ${distText}<br>
    Address: ${item.location.address}</p>`;

    L.polyline([[lat,lng],[item.location.lat,item.location.lng]],
    {color:'red',dashArray:'4'}).addTo(lineLayer);
  });

  document.getElementById("resultsContent").innerHTML=html;
}

/* ===== LAYER CONTROL ===== */
L.control.layers(null,{
  "Clinics":clinicLayer,
  "Residential Opportunity":opportunityLayer,
  "Industrial / Business":industrialLayer,
  "Restricted / Defence":restrictedLayer
}).addTo(map);

</script>
</body>
</html>
