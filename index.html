<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>SG Vet Gap Analyzer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin:0; font-family:Arial, sans-serif; }
#map { height:100vh; }

.control-panel {
  position:absolute;
  top:10px;
  left:10px;
  width:260px;
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.25);
  z-index:1000;
  font-size:14px;
}

.control-panel input,
.control-panel select {
  width:100%;
  margin-top:6px;
  margin-bottom:12px;
  padding:6px;
}

#sidePanel {
  position:absolute;
  top:10px;
  right:10px;
  width:300px;
  height:calc(100% - 20px);
  background:white;
  box-shadow:-3px 0 10px rgba(0,0,0,0.3);
  padding:20px;
  overflow:auto;
  transform:translateX(110%);
  transition:0.3s ease;
  z-index:1200;
}

#sidePanel.open {
  transform:translateX(0);
}

#closePanel {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}

.legend {
  background:white;
  padding:10px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  line-height:20px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
  <b>Competition Radius (Gap View)</b>
  <select id="radiusSelect">
    <option value="1" selected>1 km</option>
    <option value="2">2 km</option>
    <option value="3">3 km</option>
  </select>

  <b>Max Clinics Within Radius</b>
  <input type="number" id="maxClinics" value="0">

  <b>Min Residential %</b>
  <input type="number" id="minRes" value="70">

  <hr>

  <b>Evaluate Site (Postal Code)</b>
  <input type="text" id="postalInput" placeholder="Enter 6-digit postal">
  <button onclick="searchPostal()">Evaluate</button>
</div>

<div id="sidePanel">
  <div id="closePanel" onclick="closePanel()">✕</div>
  <h3>Site Evaluation</h3>
  <div id="evaluationResult"></div>
</div>

<script src="locations.js"></script>

<script>
const map = L.map('map',{zoomControl:false}).setView([1.3521,103.8198],11);
L.control.zoom({ position:'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

/* Clinics */
const clinicCluster = L.markerClusterGroup();
const bufferLayer = L.layerGroup().addTo(map);
const searchLineLayer = L.layerGroup();

locations.forEach(loc=>{
  const marker = L.marker([loc.lat, loc.lng]);
  let popup = `<b>${loc.address}</b><br>`;
  loc.clinics.forEach(c=>{
    popup += `${c.name}<br>${c.phone}<br><br>`;
  });
  marker.bindPopup(popup);
  clinicCluster.addLayer(marker);

  L.circle([loc.lat, loc.lng],{
    radius:1000,
    color:'blue',
    weight:1,
    fillOpacity:0.05
  }).addTo(bufferLayer);
});

map.addLayer(clinicCluster);

/* Zoning */
const industrialLayer = L.layerGroup().addTo(map);
const restrictedLayer = L.layerGroup().addTo(map);

fetch('industrial-zones.json')
.then(r=>r.json())
.then(data=>{
  L.geoJSON(data,{style:{color:'orange',weight:1,fillOpacity:0.15}}).addTo(industrialLayer);
});

fetch('restricted-zones.json')
.then(r=>r.json())
.then(data=>{
  L.geoJSON(data,{style:{color:'black',weight:1,fillOpacity:0.25}}).addTo(restrictedLayer);
});

/* Grid */
let grids={};
let activeGrid=L.layerGroup().addTo(map);

Promise.all([
fetch('grid-1km.json').then(r=>r.json()),
fetch('grid-2km.json').then(r=>r.json()),
fetch('grid-3km.json').then(r=>r.json())
]).then(([g1,g2,g3])=>{
grids[1]=g1;
grids[2]=g2;
grids[3]=g3;
renderGrid();
});

function renderGrid(){
activeGrid.clearLayers();
const r=document.getElementById('radiusSelect').value;
const maxC=parseInt(document.getElementById('maxClinics').value);
const minRes=parseFloat(document.getElementById('minRes').value)/100;

grids[r].forEach(cell=>{
if(cell.dominant_type!=="residential") return;
if(cell.clinic_count>maxC) return;
if(cell.residential_pct<minRes) return;

L.rectangle([
[cell.lat,cell.lng],
[cell.lat+0.0035,cell.lng+0.0035]
],{color:'green',weight:0.3,fillOpacity:0.4}).addTo(activeGrid);
});
}

document.getElementById('radiusSelect').onchange=renderGrid;
document.getElementById('maxClinics').oninput=renderGrid;
document.getElementById('minRes').oninput=renderGrid;

function closePanel(){
document.getElementById('sidePanel').classList.remove('open');
}
</script>
</body>
</html>
