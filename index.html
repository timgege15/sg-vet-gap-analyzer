<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Gap Analyzer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
  body { margin: 0; }
  #map { height: 100vh; }
</style>
</head>
<body>

<div id="map"></div>

<script src="locations.js"></script>

<script>

const map = L.map('map').setView([1.3521, 103.8198], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const markerCluster = L.markerClusterGroup();
const bufferLayer = L.layerGroup();
const gapLayer = L.layerGroup();

let uraLanduse = null;

/* Load URA Simplified Zoning */

fetch('ura-landuse-simplified.geojson')
  .then(res => res.json())
  .then(data => {
    uraLanduse = data.features;
    console.log("URA zoning loaded:", uraLanduse.length, "features");
  })
  .catch(err => {
    console.log("URA zoning failed:", err);
  });

/* Clinics + Buffers */

locations.forEach(location => {

  const marker = L.marker([location.lat, location.lng]);
  markerCluster.addLayer(marker);

  L.circle([location.lat, location.lng], {
    radius: 1000,
    color: '#2b7bff',
    weight: 1,
    fillOpacity: 0.05
  }).addTo(bufferLayer);
});

map.addLayer(markerCluster);
map.addLayer(bufferLayer);

/* Haversine */

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* Grid (unchanged for now) */

function buildGrid() {

  const bounds = [
    [1.20, 103.60],
    [1.48, 104.05]
  ];

  const cellSize = 0.0035;

  for (let lat = bounds[0][0]; lat <= bounds[1][0]; lat += cellSize) {
    for (let lng = bounds[0][1]; lng <= bounds[1][1]; lng += cellSize) {

      const centerLat = lat + cellSize/2;
      const centerLng = lng + cellSize/2;

      let minDistance = Infinity;

      for (let i = 0; i < locations.length; i++) {
        const loc = locations[i];
        const dist = haversine(centerLat, centerLng, loc.lat, loc.lng);
        if (dist < minDistance) minDistance = dist;
      }

      if (minDistance > 1000) {
        L.rectangle([
          [lat, lng],
          [lat + cellSize, lng + cellSize]
        ], {
          color: 'red',
          weight: 0.2,
          fillColor: 'red',
          fillOpacity: 0.25
        }).addTo(gapLayer);
      }
    }
  }

  map.addLayer(gapLayer);
}

setTimeout(buildGrid, 1000);

L.control.layers(null, {
  "Clinics": markerCluster,
  "1km Competition Radius": bufferLayer,
  "White-Space (>1km)": gapLayer
}).addTo(map);

</script>

</body>
</html>
