<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Gap Analyzer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
  body { margin: 0; }
  #map { height: 100vh; }

  .legend {
    background: white;
    padding: 10px;
    line-height: 18px;
    border-radius: 6px;
    box-shadow: 0 0 6px rgba(0,0,0,0.2);
  }

  .legend i {
    width: 14px;
    height: 14px;
    float: left;
    margin-right: 8px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div id="map"></div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521, 103.8198], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const markerCluster = L.markerClusterGroup();
const bufferLayer = L.layerGroup();

const residentialLayer = L.layerGroup();
const industrialLayer = L.layerGroup();
const militaryLayer = L.layerGroup();

let uraFeatures = [];

/* ============================
   LOAD URA
============================ */

fetch('ura-landuse-simplified.geojson')
  .then(res => res.json())
  .then(data => {
    uraFeatures = data.features;
    console.log("URA zoning loaded:", uraFeatures.length);
    buildGrid(); // run only after zoning loaded
  });

/* ============================
   CLINICS + BUFFERS
============================ */

locations.forEach(location => {

  markerCluster.addLayer(
    L.marker([location.lat, location.lng])
  );

  bufferLayer.addLayer(
    L.circle([location.lat, location.lng], {
      radius: 1000,
      color: '#2b7bff',
      weight: 1,
      fillOpacity: 0.05
    })
  );
});

map.addLayer(markerCluster);
map.addLayer(bufferLayer);

/* ============================
   DISTANCE FUNCTION
============================ */

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ============================
   POINT IN POLYGON
============================ */

function pointInPolygon(point, vs) {
  let x = point[0], y = point[1];
  let inside = false;

  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1];
    let xj = vs[j][0], yj = vs[j][1];

    let intersect = ((yi > y) != (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

/* ============================
   CLASSIFY LANDUSE
============================ */

function classifyLanduse(lat, lng) {

  for (let feature of uraFeatures) {

    const geom = feature.geometry;
    const lu = feature.properties.LU_DESC;

    if (geom.type === "Polygon") {
      if (pointInPolygon([lng, lat], geom.coordinates[0])) {
        return lu;
      }
    }

    if (geom.type === "MultiPolygon") {
      for (let poly of geom.coordinates) {
        if (pointInPolygon([lng, lat], poly[0])) {
          return lu;
        }
      }
    }
  }

  return null;
}

/* ============================
   BUILD GRID WITH ZONING
============================ */

function buildGrid() {

  const bounds = [
    [1.20, 103.60],
    [1.48, 104.05]
  ];

  const cellSize = 0.0035;

  for (let lat = bounds[0][0]; lat <= bounds[1][0]; lat += cellSize) {
    for (let lng = bounds[0][1]; lng <= bounds[1][1]; lng += cellSize) {

      const centerLat = lat + cellSize/2;
      const centerLng = lng + cellSize/2;

      let minDistance = Infinity;

      for (let loc of locations) {
        const dist = haversine(centerLat, centerLng, loc.lat, loc.lng);
        if (dist < minDistance) minDistance = dist;
      }

      if (minDistance > 1000) {

        const zone = classifyLanduse(centerLat, centerLng);
        if (!zone) continue;

        let targetLayer = null;
        let color = null;

        if (zone.includes("RESIDENTIAL")) {
          targetLayer = residentialLayer;
          color = "red";
        }
        else if (zone.includes("INDUSTRIAL")) {
          targetLayer = industrialLayer;
          color = "orange";
        }
        else if (zone.includes("MILITARY")) {
          targetLayer = militaryLayer;
          color = "black";
        }
        else {
          continue; // skip water or others
        }

        L.rectangle([
          [lat, lng],
          [lat + cellSize, lng + cellSize]
        ], {
          color: color,
          weight: 0.2,
          fillColor: color,
          fillOpacity: 0.35
        }).addTo(targetLayer);
      }
    }
  }

  map.addLayer(residentialLayer);
  map.addLayer(industrialLayer);
  map.addLayer(militaryLayer);
}

/* ============================
   LAYER CONTROLS
============================ */

L.control.layers(null, {
  "Clinics": markerCluster,
  "1km Buffers": bufferLayer,
  "Residential White-Space": residentialLayer,
  "Industrial (Avoid)": industrialLayer,
  "Military (Off-Limits)": militaryLayer
}).addTo(map);

/* ============================
   LEGEND
============================ */

const legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML += '<b>Legend</b><br><br>';
  div.innerHTML += '<i style="background:red"></i> Residential Opportunity<br>';
  div.innerHTML += '<i style="background:orange"></i> Industrial (Low Demand)<br>';
  div.innerHTML += '<i style="background:black"></i> Military (Restricted)<br>';
  div.innerHTML += '<i style="background:#2b7bff"></i> 1km Competition Radius<br>';
  return div;
};

legend.addTo(map);

</script>

</body>
</html>
