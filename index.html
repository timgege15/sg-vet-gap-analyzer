<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Strategic Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin: 0; }
#map { height: 100vh; }

.radius-control {
  position: absolute;
  top: 70px;
  left: 10px;
  z-index: 2000;
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-size: 13px;
}

.popup-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.clinic-entry {
  margin-bottom: 6px;
}

.clinic-phone {
  color: #2b7bff;
  font-size: 13px;
}

.legend {
  background: white;
  padding: 10px;
  line-height: 18px;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  font-size: 13px;
}

.legend i {
  width: 14px;
  height: 14px;
  float: left;
  margin-right: 8px;
  opacity: 0.85;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="radius-control">
  Competition Radius:
  <select id="radiusSelect">
    <option value="1">1km</option>
    <option value="2">2km</option>
    <option value="3">3km</option>
  </select>
</div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521, 103.8198], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const clinicLayer = L.markerClusterGroup();
const bufferLayer = L.layerGroup();

const opportunityLayer = L.layerGroup();
const industrialLayer = L.layerGroup();
const restrictedLayer = L.layerGroup();

let currentGridLayer = null;

/* ============================
   LOAD CLINICS WITH POPUPS
============================ */

locations.forEach(loc => {

  const marker = L.marker([loc.lat, loc.lng]);

  let popupContent = `
    <div class="popup-title">${loc.address}</div>
  `;

  loc.clinics.forEach(clinic => {
    popupContent += `
      <div class="clinic-entry">
        <b>${clinic.name}</b><br>
        <span class="clinic-phone">📞 ${clinic.phone}</span>
      </div>
    `;
  });

  marker.bindPopup(popupContent);
  clinicLayer.addLayer(marker);

  bufferLayer.addLayer(
    L.circle([loc.lat, loc.lng], {
      radius: 1000,
      color: '#2b7bff',
      weight: 1,
      fillOpacity: 0.05
    })
  );
});

map.addLayer(clinicLayer);
map.addLayer(bufferLayer);

/* ============================
   LOAD GRID
============================ */

function loadGrid(radiusKm) {

  if (currentGridLayer) {
    map.removeLayer(currentGridLayer);
  }

  opportunityLayer.clearLayers();
  industrialLayer.clearLayers();
  restrictedLayer.clearLayers();

  fetch(`grid-${radiusKm}km.json`)
    .then(res => res.json())
    .then(grid => {

      const cellSize = 0.0035;

      grid.forEach(cell => {

        let layer;
        let color;

        if (cell.type === "opportunity") {
          layer = opportunityLayer;
          color = "green";
        } else if (cell.type === "industrial") {
          layer = industrialLayer;
          color = "orange";
        } else if (cell.type === "restricted") {
          layer = restrictedLayer;
          color = "#444";
        } else {
          return;
        }

        L.rectangle(
          [[cell.lat, cell.lng],
           [cell.lat + cellSize, cell.lng + cellSize]],
          {
            color: color,
            weight: 0.2,
            fillColor: color,
            fillOpacity: 0.35
          }
        ).addTo(layer);
      });

      currentGridLayer = L.layerGroup([
        opportunityLayer,
        industrialLayer,
        restrictedLayer
      ]);

      map.addLayer(currentGridLayer);
    });
}

loadGrid(1);

document.getElementById("radiusSelect")
  .addEventListener("change", function() {
    loadGrid(this.value);
  });

L.control.layers(null, {
  "Clinics": clinicLayer,
  "1km Buffers": bufferLayer,
  "Residential Opportunity": opportunityLayer,
  "Industrial / Business (Excluded)": industrialLayer,
  "Restricted / Defence (Excluded)": restrictedLayer
}).addTo(map);

const legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML += '<b>Legend</b><br><br>';
  div.innerHTML += '<i style="background:green"></i> Residential Opportunity<br>';
  div.innerHTML += '<i style="background:orange"></i> Industrial / Business<br>';
  div.innerHTML += '<i style="background:#444"></i> Restricted / Defence<br>';
  div.innerHTML += '<i style="background:#2b7bff"></i> Clinic Location<br>';
  return div;
};

legend.addTo(map);

</script>
</body>
</html>
