<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Strategic Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin: 0; }
#map { height: 100vh; }

/* Radius Control */
.radius-control {
  position: absolute;
  top: 70px;
  left: 10px;
  z-index: 2000;
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-size: 13px;
}

/* Postal Search */
.search-control {
  position: absolute;
  top: 130px;
  left: 10px;
  z-index: 2000;
  background: white;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-size: 13px;
}

.search-control input {
  width: 120px;
  padding: 4px;
}

.search-control button {
  margin-left: 5px;
  padding: 4px 6px;
}

/* Side Panel */
.side-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 280px;
  height: 100%;
  background: white;
  z-index: 1500;
  padding: 15px;
  box-shadow: -2px 0 6px rgba(0,0,0,0.2);
  overflow-y: auto;
  font-size: 14px;
}

.side-panel h3 {
  margin-top: 0;
}

.legend {
  background: white;
  padding: 10px;
  line-height: 18px;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  font-size: 13px;
}

.legend i {
  width: 14px;
  height: 14px;
  float: left;
  margin-right: 8px;
  opacity: 0.85;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="radius-control">
  Competition Radius:
  <select id="radiusSelect">
    <option value="1">1km</option>
    <option value="2">2km</option>
    <option value="3">3km</option>
  </select>
</div>

<div class="search-control">
  <div><b>Evaluate Site</b></div>
  <input type="text" id="postalInput" placeholder="Postal Code" />
  <button onclick="searchPostal()">Search</button>
</div>

<div class="side-panel" id="resultsPanel">
  <h3>Site Evaluation</h3>
  <div id="resultsContent">
    Enter postal code to evaluate location.
  </div>
</div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521, 103.8198], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const clinicLayer = L.markerClusterGroup();
const bufferLayer = L.layerGroup();

let siteMarker = null;
let lineLayer = L.layerGroup().addTo(map);

locations.forEach(loc => {
  clinicLayer.addLayer(L.marker([loc.lat, loc.lng]));
  bufferLayer.addLayer(
    L.circle([loc.lat, loc.lng], {
      radius: 1000,
      color: '#2b7bff',
      weight: 1,
      fillOpacity: 0.05
    })
  );
});

map.addLayer(clinicLayer);
map.addLayer(bufferLayer);

/* Distance function */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* Postal Search */
function searchPostal() {
  const postal = document.getElementById("postalInput").value.trim();

  if (!/^\d{6}$/.test(postal)) {
    alert("Enter valid 6-digit postal code.");
    return;
  }

  fetch(`https://developers.onemap.sg/commonapi/search?searchVal=${postal}&returnGeom=Y&getAddrDetails=Y`)
    .then(res => res.json())
    .then(data => {

      if (!data.results.length) {
        alert("Postal code not found.");
        return;
      }

      const lat = parseFloat(data.results[0].LATITUDE);
      const lng = parseFloat(data.results[0].LONGITUDE);

      if (siteMarker) map.removeLayer(siteMarker);
      lineLayer.clearLayers();

      siteMarker = L.marker([lat, lng], {color: 'red'}).addTo(map);
      map.setView([lat, lng], 15);

      evaluateSite(lat, lng);
    });
}

function evaluateSite(lat, lng) {

  let distances = [];

  locations.forEach(loc => {
    const d = haversine(lat, lng, loc.lat, loc.lng);
    distances.push({
      distance: d,
      location: loc
    });
  });

  distances.sort((a,b) => a.distance - b.distance);

  const top3 = distances.slice(0,3);

  let html = "<h3>Nearest Clinics</h3>";

  top3.forEach((item, index) => {

    const d = item.distance;
    const distText = d < 1000 ? `${Math.round(d)} m`
                              : `${(d/1000).toFixed(2)} km`;

    const clinicNames = item.location.clinics.map(c => c.name).join(", ");

    html += `<p><b>${index+1}. ${clinicNames}</b><br>
             Distance: ${distText}<br>
             Address: ${item.location.address}</p>`;

    L.polyline(
      [[lat, lng], [item.location.lat, item.location.lng]],
      {color: 'red', dashArray: '4'}
    ).addTo(lineLayer);
  });

  document.getElementById("resultsContent").innerHTML = html;
}

</script>
</body>
</html>
