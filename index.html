<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Strategic Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin: 0; }
#map { height: 100vh; }

.legend {
  background: white;
  padding: 10px;
  line-height: 18px;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  font-size: 13px;
}

.legend i {
  width: 14px;
  height: 14px;
  float: left;
  margin-right: 8px;
  opacity: 0.85;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521, 103.8198], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const clinicLayer = L.markerClusterGroup();
const bufferLayer = L.layerGroup();
const gridLayer = L.layerGroup();

/* ============================
   LOAD CLINICS
============================ */

locations.forEach(loc => {

  clinicLayer.addLayer(
    L.marker([loc.lat, loc.lng])
  );

  bufferLayer.addLayer(
    L.circle([loc.lat, loc.lng], {
      radius: 1000,
      color: '#2b7bff',
      weight: 1,
      fillOpacity: 0.05
    })
  );
});

map.addLayer(clinicLayer);
map.addLayer(bufferLayer);

/* ============================
   LOAD PRECOMPUTED GRID
============================ */

fetch('grid-precomputed.json')
  .then(res => res.json())
  .then(grid => {

    const cellSize = 0.0035;

    grid.forEach(cell => {

      let color;

      if (cell.type === "industrial") {
        color = "orange";
      } else if (cell.type === "restricted") {
        color = "#444";
      } else if (cell.type === "opportunity") {
        color = "green";
      } else {
        return;
      }

      L.rectangle(
        [[cell.lat, cell.lng],
         [cell.lat + cellSize, cell.lng + cellSize]],
        {
          color: color,
          weight: 0.2,
          fillColor: color,
          fillOpacity: 0.35
        }
      ).addTo(gridLayer);
    });

    map.addLayer(gridLayer);
  });

/* ============================
   CONTROLS
============================ */

L.control.layers(null, {
  "Clinics": clinicLayer,
  "1km Buffers": bufferLayer,
  "Strategic Zoning Grid": gridLayer
}).addTo(map);

/* ============================
   LEGEND
============================ */

const legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML += '<b>Legend</b><br><br>';
  div.innerHTML += '<i style="background:green"></i> Residential Opportunity<br>';
  div.innerHTML += '<i style="background:orange"></i> Industrial / Business<br>';
  div.innerHTML += '<i style="background:#444"></i> Restricted / Defence<br>';
  div.innerHTML += '<i style="background:#2b7bff"></i> 1km Competition<br>';
  return div;
};

legend.addTo(map);

</script>
</body>
</html>
