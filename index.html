<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Strategic Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin:0; }
#map { height:100vh; }

.legend {
  background:white;
  padding:10px;
  border-radius:6px;
  box-shadow:0 0 6px rgba(0,0,0,0.2);
  font-size:13px;
}
.legend i {
  width:14px;
  height:14px;
  float:left;
  margin-right:8px;
  opacity:0.9;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="locations.js"></script>

<script>

const map = L.map('map').setView([1.3521,103.8198],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18
}).addTo(map);

/* -------------------- CLINICS -------------------- */

const clinicLayer = L.markerClusterGroup();

locations.forEach(loc=>{
  const marker = L.marker([loc.lat,loc.lng]);
  let popup = `<b>${loc.address}</b><br><br>`;
  loc.clinics.forEach(c=>{
    popup += `<b>${c.name}</b><br>📞 ${c.phone}<br><br>`;
  });
  marker.bindPopup(popup);
  clinicLayer.addLayer(marker);
});

map.addLayer(clinicLayer);

/* -------------------- OPPORTUNITY GRID -------------------- */

const opportunityLayer = L.layerGroup();
let currentGridLayer = null;

function loadGrid(radiusKm){

  if(currentGridLayer){
    map.removeLayer(currentGridLayer);
  }

  opportunityLayer.clearLayers();

  fetch(`grid-${radiusKm}km.json?v=${Date.now()}`)
  .then(res=>res.json())
  .then(grid=>{

    const cellSize = 0.0035;

    grid.forEach(cell=>{
      let color = cell.type==="public_opportunity"
        ? "#2ecc71"
        : "#3498db";

      L.rectangle(
        [[cell.lat,cell.lng],[cell.lat+cellSize,cell.lng+cellSize]],
        {color,weight:0.2,fillColor:color,fillOpacity:0.35}
      ).addTo(opportunityLayer);
    });

    currentGridLayer = opportunityLayer;
    map.addLayer(opportunityLayer);
  });
}

loadGrid(1);

/* -------------------- INDUSTRIAL LAYER -------------------- */

const industrialLayer = L.geoJSON(null,{
  style:{
    color:"orange",
    weight:0.5,
    fillOpacity:0.3
  }
});

fetch("industrial-zones.json?v="+Date.now())
  .then(res=>res.json())
  .then(data=>{
    industrialLayer.addData(data);
  });

/* -------------------- RESTRICTED LAYER -------------------- */

const restrictedLayer = L.geoJSON(null,{
  style:{
    color:"#444",
    weight:0.5,
    fillOpacity:0.35
  }
});

fetch("restricted-zones.json?v="+Date.now())
  .then(res=>res.json())
  .then(data=>{
    restrictedLayer.addData(data);
  });

/* -------------------- LAYER CONTROL -------------------- */

L.control.layers(null,{
  "Clinics": clinicLayer,
  "Opportunity": opportunityLayer,
  "Industrial": industrialLayer,
  "Restricted": restrictedLayer
}).addTo(map);

/* -------------------- LEGEND -------------------- */

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  div.innerHTML += "<b>Legend</b><br><br>";
  div.innerHTML += '<i style="background:#2ecc71"></i> HDB-Dominant Opportunity<br>';
  div.innerHTML += '<i style="background:#3498db"></i> Private-Dominant Opportunity<br>';
  div.innerHTML += '<i style="background:orange"></i> Industrial<br>';
  div.innerHTML += '<i style="background:#444"></i> Restricted<br>';
  return div;
};

legend.addTo(map);

</script>
</body>
</html>
