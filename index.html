<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SG Vet Gap Analyzer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body { margin:0; }
#map { height:100vh; }

.control-box {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:12px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  z-index:1000;
  font-size:14px;
}

.control-box select,
.control-box input {
  margin-top:6px;
  width:100%;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="control-box">
  <label><b>Competition Radius</b></label>
  <select id="radiusSelect">
    <option value="1">1 km</option>
    <option value="2">2 km</option>
    <option value="3">3 km</option>
  </select>

  <label><b>Max Clinics</b></label>
  <input type="number" id="maxClinics" value="1" min="0" max="10">

  <label><b>Min Residential %</b></label>
  <input type="number" id="minRes" value="40" min="0" max="100">
</div>

<script src="locations.js"></script>

<script>
const map = L.map('map').setView([1.3521,103.8198],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18,
  attribution:'© OpenStreetMap'
}).addTo(map);

const gridLayers = {
  1: [],
  2: [],
  3: []
};

let activeLayer = L.layerGroup().addTo(map);

function loadAllGrids() {
  return Promise.all([
    fetch('grid-1km.json').then(r=>r.json()),
    fetch('grid-2km.json').then(r=>r.json()),
    fetch('grid-3km.json').then(r=>r.json())
  ]).then(([g1,g2,g3])=>{
    gridLayers[1] = g1;
    gridLayers[2] = g2;
    gridLayers[3] = g3;
  });
}

function renderGrid() {
  activeLayer.clearLayers();

  const radius = document.getElementById('radiusSelect').value;
  const maxClinics = parseInt(document.getElementById('maxClinics').value);
  const minRes = parseFloat(document.getElementById('minRes').value) / 100;

  const cells = gridLayers[radius];

  cells.forEach(cell=>{
    if(cell.dominant_type !== "residential") return;
    if(cell.clinic_count > maxClinics) return;
    if(cell.residential_pct < minRes) return;

    const rect = L.rectangle([
      [cell.lat, cell.lng],
      [cell.lat+0.0035, cell.lng+0.0035]
    ],{
      color:'green',
      weight:0.3,
      fillOpacity:0.4
    });

    activeLayer.addLayer(rect);
  });
}

document.getElementById('radiusSelect').addEventListener('change', renderGrid);
document.getElementById('maxClinics').addEventListener('input', renderGrid);
document.getElementById('minRes').addEventListener('input', renderGrid);

loadAllGrids().then(()=>{
  renderGrid();
});
</script>

</body>
</html>
